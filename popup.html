<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; font-family: sans-serif; padding: 12px; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    button { width: 100%; padding: 8px; font-size: 13px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { margin-top: 10px; font-size: 12px; color: #333; min-height: 16px; }
    progress { width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>BookRoll PDF Exporter</h1>
  <button id="export">PDFとして書き出す</button>
  <button id="export-text">テキスト情報だけを抜き出す</button>
  <progress id="bar" value="0" max="100" hidden></progress>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
